name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      NODE_ENV: test
      SUPABASE_URL: https://placeholder.supabase.co
      SUPABASE_KEY: placeholder-key-for-ci
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key-for-ci
      TELEGRAM_BOT_TOKEN: placeholder-token
      RESEND_API_KEY: placeholder-resend-key
      PORT: 3000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
